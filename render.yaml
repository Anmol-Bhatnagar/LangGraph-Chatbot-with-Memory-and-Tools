services:
  - type: web
    name: langgraph-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APP_NAME
        value: "LangGraph Chatbot with Long-Term Memory"
      - key: APP_ENV
        value: production
      - key: DB_PATH
        value: memories.db
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: "my-agent-service"
